<!-- Student Portal Page -->
<section id="student-portal" class="page">
    <div class="container">
        <div class="portal-header">
            <h1>Student Portal</h1>
            <div class="user-info">
                <span id="user-email"></span>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="portal-content">
            <h2>Your Hackathon History</h2>
            <div class="hackathons-grid" id="student-hackathons">
                <!-- Student's hackathons will be populated by JavaScript -->
            </div>
        </div>
    </div>
</section>
