<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        .navbar { background: #333; padding: 1rem; }
        .nav-menu { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; }
        .nav-link { color: white; text-decoration: none; }
        .test-link { color: red !important; font-size: 20px !important; background-color: yellow !important; padding: 10px !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-menu">
            <li><a href="#" class="nav-link">Home</a></li>
            <li><a href="#" class="nav-link">Hackathons</a></li>
            <li><a href="#" class="nav-link test-link" id="test-link">TEST PORTAL TEXT</a></li>
        </ul>
    </nav>
    
    <h1>Simple Test Page</h1>
    <p>This is a simple test to see if the navigation text displays correctly.</p>
    
    <script>
        console.log('=== SIMPLE TEST ===');
        const testLink = document.getElementById('test-link');
        if (testLink) {
            console.log('Test link found:', testLink.textContent);
            console.log('Test link styles:', testLink.style.cssText);
        }
        
        // Monitor for changes
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'childList' || mutation.type === 'characterData') {
                    console.log('TEXT CHANGED to:', testLink.textContent);
                }
            });
        });
        
        if (testLink) {
            observer.observe(testLink, {
                childList: true,
                characterData: true,
                subtree: true
            });
        }
    </script>
</body>
</html>
